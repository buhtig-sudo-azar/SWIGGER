events {
    worker_connections 1024;
}

http {
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path /tmp/nginx_proxy;
    fastcgi_temp_path /tmp/nginx_fastcgi;
    uwsgi_temp_path /tmp/nginx_uwsgi;
    scgi_temp_path /tmp/nginx_scgi;

    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=wcd:10m max_size=10m;

    server {
        listen 8080;

        # === УНИВЕРСАЛЬНАЯ ЗАЩИТА ОТ WCD ===
set $wcd_bypass 0;

# Ловим любые нестандартные символы в пути (до query string)
if ($uri ~* "[^a-zA-Z0-9/_\-\.]") {
    set $wcd_bypass 1;
}

# Дополнительно: явные аномалии (path traversal, encoded)
if ($request_uri ~* "\.\./|\.\.%2F|%2E%2E%2F|%00|%0A|%09") {
    set $wcd_bypass 1;
}
        

        location ~* \.(css|js|jpg)$ {
            proxy_cache wcd;
            proxy_cache_valid 200 60m;

            # === ЗАЩИТА ОТ WCD: ПРИМЕНЕНИЕ ===
            proxy_no_cache $wcd_bypass;
            proxy_cache_bypass $wcd_bypass;

            proxy_pass http://127.0.0.1:8081;
            add_header X-Cache-Status $upstream_cache_status;
        }

        location / {
            proxy_pass http://127.0.0.1:8081;
        }
    }
}